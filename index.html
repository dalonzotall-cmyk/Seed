here<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#101018">
    <meta name="description" content="Sovereign Media Orchestrator - Animation & Film Deconstruction System">
    <title>Seed</title>

    <style>
        :root {
            --bg: #101018;
            --fg: #e0e0e0;
            --accent: #c8a96e; /* Sovereign Gold */
            --matrix: #00ff41;
            --border: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--fg); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }

        /* AES-256 VAULT UI */
        #vault {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .hex-seal { font-size: 4rem; color: var(--accent); margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--accent)); }
        input { 
            background: transparent; border: none; border-bottom: 1px solid var(--border); 
            color: var(--accent); text-align: center; font-size: 1.2rem; outline: none; width: 260px; letter-spacing: 5px; 
        }

        /* SOVEREIGN GRID ⬡ */
        #app { display: none; height: 100vh; flex-direction: column; }
        nav { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; letter-spacing: 8px; color: var(--accent); font-size: 0.8rem; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 25px; overflow-y: auto; flex-grow: 1; }
        .hex { 
            aspect-ratio: 1/1.15; background: #1a1a24; border: 1px solid var(--border); 
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--fg);
        }

        /* SYSTEM B LOGS */
        #logs { height: 150px; background: #08080c; border-top: 2px solid var(--border); padding: 15px; font-size: 10px; overflow-y: auto; color: var(--matrix); }
        .log { margin-bottom: 4px; border-left: 2px solid var(--accent); padding-left: 10px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="vault">
        <div class="hex-seal">⬡</div>
        <input type="password" id="key" placeholder="SECURE_KEY" autofocus>
    </div>

    <div id="app">
        <nav>SOVEREIGN SEED V3.0</nav>
        <div class="grid" id="hex-grid"></div>
        <div id="logs">
            <div class="log">[C] SESSION_PRIME INITIALIZED</div>
            <div class="log">[C] HARDWARE_ANNEXATION ACTIVE</div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        // 21-Lens ⬡ Mapping
        const lenses = ["TRUTH", "LOGIC", "SAFETY", "DELTA", "AUDIT", "LEAN", "COMPUTE", "LATENCY", "VERBOSITY", "CORE", "VETO", "PLAN", "EXEC", "FIX", "SYNC", "VAULT", "SEED", "SOV", "HEX", "B-SYSTEM", "MAP"];
        const grid = document.getElementById('hex-grid');
        lenses.forEach(l => {
            const d = document.createElement('div'); d.className = 'hex'; d.innerText = l;
            grid.appendChild(d);
        });

        // Decryption Entry
        const pass = document.getElementById('key');
        pass.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && pass.value.length > 0) {
                document.getElementById('vault').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('vault').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                }, 800);
            }
        });
    </script>
</body>
</html>
